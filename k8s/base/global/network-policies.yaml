---
# 1. Default Deny All
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: nbcfdc-credit-scoring
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# 2. Allow DNS Egress (Crucial for all pods)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: nbcfdc-credit-scoring
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# 3. Allow External Ingress Controller -> Frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-to-frontend
  namespace: nbcfdc-credit-scoring
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
---
# 4. Allow Ingress Controller -> API & Keycloak
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-to-api-auth
  namespace: nbcfdc-credit-scoring
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [api, keycloak]}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
---
# 5. Allow Frontend -> API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-to-api
  namespace: nbcfdc-credit-scoring
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
---
# 6. Allow API -> Databases & Brokers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-egress-to-dbs
  namespace: nbcfdc-credit-scoring
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchExpressions:
          - {key: app, operator: In, values: [postgres, mongodb, redis, kafka]}
---
# 7. Allow DBs to receive from API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dbs-ingress-from-api
  namespace: nbcfdc-credit-scoring
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [postgres, mongodb, redis, kafka]}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api
---
# 8. Allow Prometheus Scraping (/metrics)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: nbcfdc-credit-scoring
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
