---
apiVersion: v1
kind: Namespace
metadata:
  name: nbcfdc-credit-scoring
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: nbcfdc-credit-scoring
spec:
  hard:
    limits.cpu: "20"
    limits.memory: "40Gi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: nbcfdc-credit-scoring
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 256Mi
    type: Container
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safecred-ingress
  namespace: nbcfdc-credit-scoring
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - app.safecred.nbcfdc.gov.in
    secretName: safecred-tls-cert
  rules:
  - host: app.safecred.nbcfdc.gov.in
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8000
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: keycloak-service
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
