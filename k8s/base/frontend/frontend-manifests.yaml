---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: nbcfdc-credit-scoring
data:
  nginx.conf: |
    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Explicit Health Probes as requested
        location /health {
            access_log off;
            return 200 'OK';
        }

        location /health/ready {
            access_log off;
            return 200 'READY';
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: nbcfdc-credit-scoring
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # nginx default non-root user
        fsGroup: 101
      containers:
      - name: frontend
        image: ghcr.io/nbcfdc/safecred-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /var/cache/nginx
        - name: run-volume
          mountPath: /var/run
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: nginx-conf
        configMap:
          name: frontend-nginx-config
      - name: tmp-volume
        emptyDir: {}
      - name: cache-volume
        emptyDir: {}
      - name: run-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: nbcfdc-credit-scoring
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: nbcfdc-credit-scoring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: nbcfdc-credit-scoring
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: frontend-external-secret
  namespace: nbcfdc-credit-scoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: frontend-secret
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: secret/nbcfdc/frontend
