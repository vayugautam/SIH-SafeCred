apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: safecred-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/org/nbcfdc-k8s.git
    targetRevision: HEAD
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: nbcfdc-credit-scoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
